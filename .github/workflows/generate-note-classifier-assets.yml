name: Generate note classifier assets

on:
  workflow_dispatch:
  push:
    paths:
      - 'app/src/main/assets/scripts/complete_pipeline.py'
      - 'app/src/main/assets/scripts/training_data_large.py'
      - '.github/workflows/generate-note-classifier-assets.yml'

jobs:
  generate-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install tensorflow==2.16.1 tf_keras==2.16.0 numpy scikit-learn

      - name: Generate model + metadata
        run: python3 app/src/main/assets/scripts/complete_pipeline.py

      - name: Copy generated assets into Android app assets
        run: |
          set -euo pipefail

          SCRIPTS_DIR="app/src/main/assets/scripts"
          ASSETS_DIR="app/src/main/assets"
          mkdir -p "$ASSETS_DIR"

          install -m 0644 "${SCRIPTS_DIR}/note_classifier.tflite" "${ASSETS_DIR}/note_classifier.tflite"
          install -m 0644 "${SCRIPTS_DIR}/tokenizer_vocabulary_v2.txt" "${ASSETS_DIR}/tokenizer_vocabulary_v2.txt"
          install -m 0644 "${SCRIPTS_DIR}/category_mapping.json" "${ASSETS_DIR}/category_mapping.json"
          install -m 0644 "${SCRIPTS_DIR}/deployment_metadata.json" "${ASSETS_DIR}/deployment_metadata.json"

      - name: Verify generated assets are present in app assets
        run: |
          set -euo pipefail

          ASSETS_DIR="app/src/main/assets"
          REQUIRED_FILES=(
            "note_classifier.tflite"
            "tokenizer_vocabulary_v2.txt"
            "category_mapping.json"
            "deployment_metadata.json"
          )

          missing=()
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -s "${ASSETS_DIR}/${file}" ]; then
              missing+=("${file}")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing generated assets in app/src/main/assets: ${missing[*]}"
            exit 1
          fi

          echo "All generated classifier assets are present."

      - name: Upload generated assets
        uses: actions/upload-artifact@v4
        with:
          name: note-classifier-assets
          path: |
            app/src/main/assets/note_classifier.tflite
            app/src/main/assets/tokenizer_vocabulary_v2.txt
            app/src/main/assets/category_mapping.json
            app/src/main/assets/deployment_metadata.json
