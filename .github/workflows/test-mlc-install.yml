name: Test MLC deploy prerequisites

# The default GitHub APK build uses the checked-in arm64 MLC model archive and
# skips optional x86_64 artifact generation. This workflow catches regressions
# in that default path without installing the incompatible MLC Python wheel set.

on:
  push:
    paths:
      - '.github/workflows/deploy.yml'
      - '.github/workflows/test-mlc-install.yml'
      - 'app/src/main/assets/Llama-3.2-3B-Instruct-q4f16_0-MLC-android.tar'
      - 'scripts/compile_model_tar.sh'
      - 'scripts/build_mlc_tvm_runtime.sh'
      - 'scripts/install_mlc_llm.sh'
      - 'scripts/mlc_llm_compile_wrapper.py'
      - 'scripts/mlc_python_env.sh'
      - 'scripts/test_mlc_install.sh'
  pull_request:
    paths:
      - '.github/workflows/deploy.yml'
      - '.github/workflows/test-mlc-install.yml'
      - 'app/src/main/assets/Llama-3.2-3B-Instruct-q4f16_0-MLC-android.tar'
      - 'scripts/compile_model_tar.sh'
      - 'scripts/build_mlc_tvm_runtime.sh'
      - 'scripts/install_mlc_llm.sh'
      - 'scripts/mlc_llm_compile_wrapper.py'
      - 'scripts/mlc_python_env.sh'
      - 'scripts/test_mlc_install.sh'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  test-mlc-deploy-prereqs:
    name: Verify default MLC deploy prerequisites
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify scripts and checked-in model archive
        run: |
          set -euo pipefail

          bash -n \
            scripts/mlc_python_env.sh \
            scripts/install_mlc_llm.sh \
            scripts/test_mlc_install.sh \
            scripts/compile_model_tar.sh \
            scripts/build_mlc_tvm_runtime.sh
          python3 -m py_compile scripts/mlc_llm_compile_wrapper.py

          TAR_PATH="app/src/main/assets/Llama-3.2-3B-Instruct-q4f16_0-MLC-android.tar"
          MIN_REAL_BYTES=102400
          if [[ ! -f "${TAR_PATH}" ]]; then
            echo "::error::Missing checked-in arm64 MLC model archive: ${TAR_PATH}"
            exit 1
          fi
          if [[ "$(stat -c%s "${TAR_PATH}")" -le "${MIN_REAL_BYTES}" ]]; then
            echo "::error::Checked-in arm64 MLC model archive looks like a stub: ${TAR_PATH}"
            exit 1
          fi

          source scripts/mlc_python_env.sh
          mlc_configure_compiler_environment
          if [[ "${SKIP_LOADING_MLCLLM_SO:-}" != "1" ]]; then
            echo "::error::MLC compiler environment should skip native MLC extension loading"
            exit 1
          fi

      - name: Verify optional x86_64 artifact step is opt-in
        run: |
          set -euo pipefail
          if ! grep -q "BUILD_X86_64_MLC_ARTIFACTS == '1'" .github/workflows/deploy.yml; then
            echo "::error::deploy.yml should keep x86_64 MLC artifact generation opt-in"
            exit 1
          fi
