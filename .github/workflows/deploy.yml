name: Build APK and upload to server

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 13114758
          packages: >-
            platform-tools
            platforms;android-34
            build-tools;34.0.0
            ndk;26.1.10909125
            ndk;27.2.12479018

      - name: Configure local.properties
        run: |
          SDK_PATH="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          if [ -z "$SDK_PATH" ]; then
            echo "Android SDK path not available" >&2
            exit 1
          fi
          echo "sdk.dir=$SDK_PATH" > local.properties

      - name: Download MLC TVM runtime native library
        run: |
          set -euo pipefail
          bash scripts/fetch_mlc_native.sh

      - name: Build MLC model library (.tar) if stub
        run: |
          set -euo pipefail

          TAR_PATH="app/src/main/assets/Llama-3.2-3B-Instruct-q4f16_0-MLC-android.tar"

          # A real compiled system-lib .tar for Llama 3.2 3B is tens of MB.
          # The placeholder stub committed to the repo is ~512 KB.
          # Anything above 10 MB is treated as a genuine compiled archive.
          MIN_REAL_BYTES=10485760

          if [[ -f "${TAR_PATH}" ]] && \
             [[ $(stat -c%s "${TAR_PATH}") -gt ${MIN_REAL_BYTES} ]]; then
            echo "✅  Model library .tar is already a real compiled archive — skipping compilation."
            echo "     Size: $(du -sh "${TAR_PATH}" | cut -f1)"
            exit 0
          fi

          echo "⚠️  Stub model library detected ($(du -sh "${TAR_PATH}" 2>/dev/null | cut -f1 || echo 'missing')) — compiling real archive."

          echo "📦  Installing git-lfs …"
          sudo apt-get install -y --no-install-recommends git-lfs
          git lfs install

          echo "📦  Installing mlc-llm …"
          pip install --pre -f https://mlc.ai/wheels mlc-llm mlc-ai-nightly-cpu

          echo "⚙️   Compiling model library (this may take 10–30 min) …"
          bash scripts/compile_model_tar.sh

          echo "📝  Committing compiled .tar back to branch …"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${TAR_PATH}"
          git commit -m "ci: replace stub model .tar with real compiled archive [skip ci]"
          git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            "HEAD:${{ github.ref_name }}"

      - name: Verify MLC model configuration assets
        run: |

          set -euo pipefail

          ASSETS_DIR="app/src/main/assets"
          mkdir -p "$ASSETS_DIR"

          # category_mapping.json is retained for fallback heuristics.
          # The Llama 3.2 3B model weights are downloaded at runtime (not bundled).
          REQUIRED_FILES=(
            "category_mapping.json"
          )

          missing=()
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "${ASSETS_DIR}/${file}" ]; then
              missing+=("${file}")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "All required configuration assets present."
          else
            echo "::error::Missing configuration assets: ${missing[*]}"
            exit 1
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Show Gradle version
        run: ./gradlew --version

      #- name: Decode keystore
      #  run: |
      #    mkdir -p app
      #    echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/starbucknotetaker.jks

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_KEYSTORE_PATH: app/starbucknotetaker.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename APK with build version
        run: |
          mkdir -p build-out
          VERSION_NAME="1.0.${GITHUB_RUN_NUMBER}"
          cp app/build/outputs/apk/debug/app-debug.apk \
            "build-out/StarbuckNoteTaker-${VERSION_NAME}.apk"

      - name: Configure SSH key for Unraid upload
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_B64 }}" | base64 --decode > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSH_IP }}" >> ~/.ssh/known_hosts

      - name: Upload final APK to Unraid over SSH
        run: |
          set -euo pipefail
          VERSION_NAME="1.0.${GITHUB_RUN_NUMBER}"
          APK_NAME="StarbuckNoteTaker-${VERSION_NAME}.apk"
          SOURCE_APK="build-out/${APK_NAME}"
          DEST_DIR="${{ secrets.SSH_PATH }}"
          DEST_FILE="${DEST_DIR}/${APK_NAME}"

          ssh -i ~/.ssh/id_rsa "${{ secrets.SSH_USER }}@${{ secrets.SSH_IP }}" \
            "mkdir -p \"${DEST_DIR}\""

          scp -i ~/.ssh/id_rsa "${SOURCE_APK}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_IP }}:${DEST_FILE}"

          ssh -i ~/.ssh/id_rsa "${{ secrets.SSH_USER }}@${{ secrets.SSH_IP }}" \
            "chown nobody:users \"${DEST_FILE}\" && chmod 777 \"${DEST_FILE}\""

      - name: Verify APK on Unraid
        run: |
          set -euo pipefail
          VERSION_NAME="1.0.${GITHUB_RUN_NUMBER}"
          APK_NAME="StarbuckNoteTaker-${VERSION_NAME}.apk"
          DEST_DIR="${{ secrets.SSH_PATH }}"
          DEST_FILE="${DEST_DIR}/${APK_NAME}"

          echo "Verifying uploaded file exists on server..."
          ssh -i ~/.ssh/id_rsa "${{ secrets.SSH_USER }}@${{ secrets.SSH_IP }}" \
            "ls -lh \"${DEST_FILE}\" && echo 'Upload verified successfully.'"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarbuckNoteTaker-1.0.${{ github.run_number }}
          path: build-out/StarbuckNoteTaker-1.0.${{ github.run_number }}.apk
          if-no-files-found: error
