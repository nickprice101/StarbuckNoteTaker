def penguinNativeConfiguration = configurations.detachedConfiguration(
        dependencies.create('ai.djl.android:tokenizer-native:0.33.0')
)
penguinNativeConfiguration.transitive = false

def robolectricAndroidAllConfiguration = configurations.detachedConfiguration(
        dependencies.create('org.robolectric:android-all-instrumented:14-robolectric-10818077-i6')
)
robolectricAndroidAllConfiguration.transitive = false

def preparePenguinNativeLibs = tasks.register('preparePenguinNativeLibs', Sync) {
    from {
        penguinNativeConfiguration.files.collect { zipTree(it) }
    }
    include(*penguinSupportedAbis.collect { "jni/${it}/libdjl_tokenizer.so" })
    eachFile { file ->
        file.path = file.path
                .replaceFirst('jni/', '')
    }
    includeEmptyDirs = false
    into(penguinNativeLibsDir)
}

def prepareLibcxxShared = tasks.register('prepareLibcxxShared', Sync) {
    into(libcxxNativeLibsDir)
    penguinSupportedAbis.each { abi ->
        from({
            File ndkDir = null
            try {
                ndkDir = android.ndkDirectory
            } catch (Throwable ignored) {
                ndkDir = null
            }
            if (ndkDir == null || !ndkDir.exists()) {
                logger.warn("android.ndkDirectory is not available; using placeholder libc++ for ABI ${abi}")
                def placeholderDir = new File(buildDir, "ndkPlaceholders/${abi}")
                placeholderDir.mkdirs()
                def placeholder = new File(placeholderDir, 'libc++_shared.so')
                if (!placeholder.exists()) {
                    placeholder.bytes = new byte[0]
                }
                return placeholder
            }
            def hostTag = resolveNdkHostTag(ndkDir)
            def triple = abiToLibcxxTriple[abi]
            def libcxxFile = new File(ndkDir, "toolchains/llvm/prebuilt/${hostTag}/sysroot/usr/lib/${triple}/libc++_shared.so")
            if (!libcxxFile.exists()) {
                throw new GradleException("Unable to find libc++_shared.so for ABI ${abi} at ${libcxxFile}")
            }
            return libcxxFile
        }) {
            into(abi)
        }
    }
}

tasks.matching { it.name.startsWith('pre') && it.name.endsWith('Build') }.configureEach {
    dependsOn(preparePenguinNativeLibs, prepareLibcxxShared)
}

tasks.matching { it.name.startsWith('merge') && it.name.endsWith('NativeLibs') }.configureEach {
    dependsOn(preparePenguinNativeLibs, prepareLibcxxShared, 'buildModelLibSo')
}

// ---------------------------------------------------------------------------
// Task: buildModelLibSoArm64Legacy
//
// Disabled reference path for the old Android-09262024 runtime. The active
// buildModelLibSo task below requires a TVM FFI-capable runtime and links the
// model objects directly against it.
//
// The legacy shim can link the object files against the older runtime, but that
// runtime cannot process the newer library_bin metadata needed to expose
// vm_load_executable.
// ---------------------------------------------------------------------------
tasks.register('buildModelLibSoArm64Legacy') {
    group = 'setup'
    description = 'Compiles TVM compat shim and links model .o files into libLlama-3.2-3B-Instruct-q4f16_0-MLC.so'
    enabled = false

    // Ensure the TVM runtime .so is present before we link against it.
    dependsOn(':mlc4j:downloadTvmRuntime')

    def tarAsset    = file("src/main/assets/Llama-3.2-3B-Instruct-q4f16_0-MLC-android.tar")
    def compatSrc   = rootProject.file("scripts/tvm_compat.c")
    def tvmSoDir    = project(':mlc4j').file("src/main/jniLibs/arm64-v8a")
    def outputDir   = file("src/main/jniLibs/arm64-v8a")
    def outputSo    = new File(outputDir, "libLlama-3.2-3B-Instruct-q4f16_0-MLC.so")

    inputs.file(tarAsset)
    inputs.file(compatSrc)
    outputs.file(outputSo)

    doLast {
        if (!tarAsset.exists()) {
            throw new GradleException("Model .tar not found: ${tarAsset}. " +
                "Run scripts/compile_model_tar.sh or let the CI workflow compile it.")
        }
        if (!compatSrc.exists()) {
            throw new GradleException("TVM compat shim not found: ${compatSrc}")
        }

        // Locate NDK clang for arm64
        def ndkDir  = android.ndkDirectory
        def hostTag = resolveNdkHostTag(ndkDir)
        def clangName = hostTag.startsWith('windows') ?
                'aarch64-linux-android26-clang.cmd' :
                'aarch64-linux-android26-clang'
        def clang   = new File(ndkDir, "toolchains/llvm/prebuilt/${hostTag}/bin/${clangName}")
        if (!clang.exists()) {
            throw new GradleException("NDK clang not found at ${clang}. " +
                "Ensure NDK 26+ is installed via the Android SDK Manager.")
        }

        // Extract .o files from the model .tar into a temporary directory
        def tmpDir = new File(buildDir, "model_obj_build")
        tmpDir.deleteDir()
        tmpDir.mkdirs()
        exec {
            commandLine 'tar', '-xf', tarAsset.absolutePath, '-C', tmpDir.absolutePath
            ignoreExitValue = false
        }

        def lib0     = new File(tmpDir, 'lib0.o')
        def devcObj  = new File(tmpDir, 'llama_q4f16_0_devc.o')
        if (!lib0.exists())    { throw new GradleException("lib0.o not found in ${tarAsset}") }
        if (!devcObj.exists()) { throw new GradleException("llama_q4f16_0_devc.o not found in ${tarAsset}") }

        // Compile the TVM API compatibility shim to an .o file
        def compatObj = new File(tmpDir, 'tvm_compat.o')
        exec {
            commandLine clang.absolutePath,
                '-target', 'aarch64-linux-android26',
                '-fPIC', '-O2',
                '-c', compatSrc.absolutePath,
                '-o', compatObj.absolutePath
        }

        outputDir.mkdirs()

        // Link: model .o + compat shim → shared library depending on the TVM runtime
        exec {
            commandLine clang.absolutePath,
                '-target', 'aarch64-linux-android26',
                '-shared',
                "-Wl,-soname,libLlama-3.2-3B-Instruct-q4f16_0-MLC.so",
                '-Wl,--build-id',
                '-Wl,-z,nocopyreloc',
                '-o', outputSo.absolutePath,
                lib0.absolutePath,
                devcObj.absolutePath,
                compatObj.absolutePath,
                "-L${tvmSoDir.absolutePath}",
                '-ltvm4j_runtime_packed',
                '-llog', '-lm', '-lc', '-ldl'
        }

        logger.lifecycle("buildModelLibSo: built ${outputSo} (${outputSo.length()} bytes)")
    }
}

tasks.register('buildModelLibSo') {
    group = 'setup'
    description = 'Links ABI-specific model .o files into libLlama-3.2-3B-Instruct-q4f16_0-MLC.so'

    dependsOn(':mlc4j:downloadTvmRuntime')

    def tvmSoDirs = llamaModelAbiProfiles.collectEntries { abi, profile ->
        [(abi): rootProject.file("mlc4j/src/main/jniLibs/${abi}")]
    }
    llamaModelAbiProfiles.each { abi, profile ->
        inputs.file(file(profile.tarAsset)).withPropertyName("modelTar_${abi}")
        inputs.file(new File(tvmSoDirs[abi], 'libtvm4j_runtime_packed.so')).withPropertyName("tvmRuntime_${abi}")
        outputs.file(new File(file("src/main/jniLibs/${abi}"), llamaModelSoName))
    }

    doLast {
        def ndkDir  = android.ndkDirectory
        def hostTag = resolveNdkHostTag(ndkDir)

        llamaModelAbiProfiles.each { abi, profile ->
            def tarAsset = file(profile.tarAsset)
            if (!tarAsset.exists()) {
                throw new GradleException("Model .tar not found for ABI ${abi}: ${tarAsset}. " +
                    "Run TARGET_ABI=${abi} scripts/compile_model_tar.sh or let CI compile it.")
            }

            def tvmSoDir = tvmSoDirs[abi]
            def tvmSo = new File(tvmSoDir, 'libtvm4j_runtime_packed.so')
            if (!tvmSo.exists()) {
                throw new GradleException("TVM runtime not found for ABI ${abi}: ${tvmSo}. " +
                    "Run TARGET_ABI=${abi} scripts/fetch_mlc_native.sh or scripts/build_mlc_tvm_runtime.sh.")
            }
            if (!runtimeSupportsTvmFfiSystemLib(tvmSo)) {
                throw new GradleException("TVM runtime for ABI ${abi} does not support TVM FFI system libraries: ${tvmSo}. " +
                    "The bundled Llama archive requires ffi.SystemLib to load library_bin and expose vm_load_executable. " +
                    "Run TARGET_ABI=${abi} scripts/fetch_mlc_native.sh to rebuild libtvm4j_runtime_packed.so from MLC source.")
            }

            def clangBaseName = "${profile.clangPrefix}26-clang"
            def clangName = hostTag.startsWith('windows') ? "${clangBaseName}.cmd" : clangBaseName
            def clang = new File(ndkDir, "toolchains/llvm/prebuilt/${hostTag}/bin/${clangName}")
            if (!clang.exists()) {
                throw new GradleException("NDK clang not found for ABI ${abi} at ${clang}. " +
                    "Ensure NDK 26+ is installed via the Android SDK Manager.")
            }

            def tmpDir = new File(buildDir, "model_obj_build/${abi}")
            tmpDir.deleteDir()
            tmpDir.mkdirs()
            exec {
                commandLine 'tar', '-xf', tarAsset.absolutePath, '-C', tmpDir.absolutePath
                ignoreExitValue = false
            }

            def objectFiles = []
            tmpDir.eachFileRecurse(FileType.FILES) { File objectFile ->
                if (objectFile.name.endsWith('.o')) {
                    objectFiles.add(objectFile)
                }
            }
            objectFiles = objectFiles.sort { it.name }
            def lib0 = objectFiles.find { it.name == 'lib0.o' }
            def modelObjects = objectFiles.findAll { it.name != 'lib0.o' }
            if (lib0 == null) {
                throw new GradleException("lib0.o not found in ${tarAsset}")
            }
            if (modelObjects.isEmpty() && abi != 'x86_64') {
                throw new GradleException("No model object files found in ${tarAsset}")
            } else if (modelObjects.isEmpty()) {
                logger.lifecycle("buildModelLibSo: ${abi} archive has lib0.o only; linking CPU model objects from lib0.o")
            }

            def outputDir = file("src/main/jniLibs/${abi}")
            def outputSo = new File(outputDir, llamaModelSoName)
            outputDir.mkdirs()

            def linkCommand = [
                clang.absolutePath,
                '-target', profile.target,
                '-shared',
                "-Wl,-soname,${llamaModelSoName}",
                '-Wl,--build-id',
                '-Wl,-z,nocopyreloc',
                '-o', outputSo.absolutePath,
                lib0.absolutePath,
            ]
            linkCommand.addAll(modelObjects.collect { it.absolutePath })
            linkCommand.addAll([
                "-L${tvmSoDir.absolutePath}",
                '-ltvm4j_runtime_packed',
                '-llog', '-lm', '-lc', '-ldl'
            ])
            exec {
                commandLine linkCommand
            }

            logger.lifecycle("buildModelLibSo: built ${abi} ${outputSo} (${outputSo.length()} bytes)")
        }
    }
}

def robolectricDependencyDir = layout.buildDirectory.dir("robolectric-deps")

tasks.withType(MergeNativeLibsTask).configureEach { task ->
    task.notCompatibleWithConfigurationCache('Aligns native libraries using an external script')
    task.doLast {
        def outputDir = task.outputDir.get().asFile
        def alignedLibraries = [] as Set<File>
        if (outputDir.exists()) {
            outputDir.eachFileRecurse(FileType.FILES) { File file ->
                if (file.name.endsWith('.so')) {
                    alignedLibraries.add(file)
                }
            }
        }
        alignNativeLibrariesAction(alignmentScriptFile, task.logger, alignedLibraries)
    }
}

tasks.withType(GenerateResValues).configureEach { task ->
    task.doLast {
        def resOutput = task.resOutputDir
        def outputDir = null
        if (resOutput != null) {
            try {
                outputDir = resOutput.get().asFile
            } catch (Throwable ignored) {
                outputDir = resOutput instanceof File ? resOutput : null
            }
        }
        ensurePlaceholderResValuesAction(outputDir)
    }
}

tasks.register('prepareRobolectricDependencies', Copy) {
    into(robolectricDependencyDir)
    from(project.provider {
        robolectricAndroidAllConfiguration
            .filter { file -> file.name.startsWith('android-all-instrumented-') }
    })
    includeEmptyDirs = false
}

tasks.withType(Test).configureEach { testTask ->
    testTask.dependsOn('prepareRobolectricDependencies')
    testTask.systemProperty 'robolectric.offline', 'true'
    testTask.systemProperty 'robolectric.logging', 'stdout'
    def depsDir = robolectricDependencyDir.get().asFile.absolutePath
    testTask.systemProperty 'robolectric.dependency.dir', depsDir
    testTask.environment 'ROBOLECTRIC_DEPENDENCY_DIR', depsDir
}
